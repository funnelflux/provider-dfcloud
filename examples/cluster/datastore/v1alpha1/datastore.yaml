---
apiVersion: datastore.dfcloud.funnelflux.pro/v1alpha1
kind: Datastore
metadata:
  name: example-datastore
spec:
  forProvider:
    name: example-datastore
    location:
      provider: gcp
      region: europe-west1
    tier:
      maxMemoryBytes: 3000000000
      performanceTier: dev
    networkIdRef:
      name: example-network
  providerConfigRef:
    name: default
---
apiVersion: datastore.dfcloud.funnelflux.pro/v1alpha1
kind: Datastore
metadata:
  annotations:
    meta.upbound.io/example-id: datastore/v1alpha1/datastore
  labels:
    testing.upbound.io/example-name: cache
  name: cache
spec:
  forProvider:
    dragonfly:
      cacheMode: true
    location:
      provider: gcp
      region: us-central1
    name: frontend-cache
    tier:
      maxMemoryBytes: 3000000000
      performanceTier: dev
      replicas: 1
---
apiVersion: network.dfcloud.funnelflux.pro/v1alpha1
kind: Network
metadata:
  annotations:
    meta.upbound.io/example-id: datastore/v1alpha1/datastore
  labels:
    testing.upbound.io/example-name: network
  name: network
spec:
  forProvider:
    cidrBlock: 192.168.0.0/16
    location:
      provider: aws
      region: eu-west-1
    name: my-network
