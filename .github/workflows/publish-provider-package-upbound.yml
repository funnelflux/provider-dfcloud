name: Publish Provider Package To Upbound

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, e.g. v0.0.2"
        required: false

jobs:
  publish-provider-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build package
        run: |
          make build.init
          make go.build
          make xpkg.build \
            VERSION="${VERSION}" \

      - name: Locate xpkg
        run: |
          PKG="$(find _output/xpkg -name "provider-dfcloud-${VERSION}.xpkg" | head -n 1)"
          test -n "${PKG}"
          echo "PKG=${PKG}" >> "${GITHUB_ENV}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: provider-dfcloud-${{ env.VERSION }}
          path: ${{ env.PKG }}

      - name: Login to Upbound Marketplace
        run: |
          echo "${{ secrets.UPBOUND_MARKETPLACE_PUSH_ROBOT_PSW }}" | \
            docker login xpkg.upbound.io \
              -u "${{ secrets.UPBOUND_MARKETPLACE_PUSH_ROBOT_USR }}" \
              --password-stdin

      - name: Push package
        run: |
          make xpkg.release.publish \
            VERSION="${VERSION}" \
            XPKG_REG_ORGS="xpkg.upbound.io/funnelflux"
